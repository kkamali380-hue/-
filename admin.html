<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت | پخش صبا</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1a6b3c;--green-light:#e8f5ee;--green-mid:#2e8b57;--accent:#f0a500;--bg:#f0f4f1;--white:#fff;--text:#1a2420;--text-light:#5a6b62;--border:#d0e0d6;--red:#dc2626;--red-light:#fee2e2;--shadow:0 2px 12px rgba(26,107,60,.10)}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text)}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;box-shadow:var(--shadow);text-align:center}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{font-size:20px;font-weight:700;color:var(--green);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text-light);margin-bottom:24px}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Vazirmatn',sans-serif;font-size:15px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:4px}
.login-btn{width:100%;background:var(--green);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Vazirmatn',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.login-error{color:var(--red);font-size:13px;margin-top:10px}
.hidden{display:none!important}
header{background:var(--green);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:700}
.logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-family:'Vazirmatn',sans-serif;font-size:13px;cursor:pointer}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:52px;z-index:90}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-light);border-bottom:3px solid transparent}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab-content{padding:16px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:12px;padding:16px;box-shadow:var(--shadow);text-align:center}
.stat-icon{font-size:28px;margin-bottom:6px}
.stat-num{font-size:22px;font-weight:700;color:var(--green)}
.stat-label{font-size:12px;color:var(--text-light);margin-top:2px}
.order-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);border-right:4px solid var(--green)}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.order-id{font-weight:700;font-size:14px;color:var(--green)}
.order-date{font-size:11px;color:var(--text-light)}
.order-info{font-size:13px;margin-bottom:6px;line-height:1.8}
.order-total{font-weight:700;color:var(--green);font-size:14px}
.order-items{font-size:12px;color:var(--text-light);margin-bottom:10px}
.status-select{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:'Vazirmatn',sans-serif;font-size:13px;outline:none;background:var(--bg);margin-top:10px}
.add-product-btn{width:100%;background:var(--green);color:#fff;border:none;padding:13px;border-radius:12px;font-family:'Vazirmatn',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px}
.product-admin-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:center}
.product-admin-img{width:52px;height:52px;background:var(--green-light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.product-admin-img img{width:100%;height:100%;object-fit:cover}
.product-admin-info{flex:1;min-width:0}
.product-admin-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-admin-price{font-size:13px;color:var(--green);font-weight:700}
.product-admin-stock{font-size:12px;color:var(--text-light)}
.product-admin-actions{display:flex;flex-direction:column;gap:6px}
.edit-btn,.del-btn{border:none;padding:6px 12px;border-radius:8px;font-family:'Vazirmatn',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.edit-btn{background:var(--green-light);color:var(--green)}
.del-btn{background:var(--red-light);color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;color:var(--green);margin-bottom:16px}
.form-row{margin-bottom:14px}
.form-label{font-size:13px;font-weight:600;color:var(--text-light);display:block;margin-bottom:6px}
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Vazirmatn',sans-serif;font-size:14px;outline:none;background:var(--bg)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.toggle{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle-thumb{position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;right:3px;transition:right .2s}
.toggle.on .toggle-thumb{right:23px}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.save-btn{flex:1;background:var(--green);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Vazirmatn',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.cancel-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text-light);padding:13px 20px;border-radius:10px;font-family:'Vazirmatn',sans-serif;font-size:15px;cursor:pointer}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-small{text-align:center;padding:30px;color:var(--text-light)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:#fef9c3;color:#854d0e}
.badge-done{background:#dcfce7;color:#166534}
.badge-cancel{background:var(--red-light);color:var(--red)}
.badge-processing{background:#dbeafe;color:#1e40af}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
<div class="login-card">
<div class="login-logo">🔐</div>
<div class="login-title">پنل مدیریت صبا</div>
<div class="login-sub">رمز عبور را وارد کنید</div>
<input class="login-input" type="password" id="passInput" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
<button class="login-btn" onclick="doLogin()">ورود</button>
<div class="login-error hidden" id="loginError">رمز اشتباه است</div>
</div>
</div>
<div id="mainApp" class="hidden">
<header>
<div class="header-title">🏥 پنل مدیریت صبا</div>
<button class="logout-btn" onclick="logout()">خروج</button>
</header>
<div class="tabs">
<div class="tab active" onclick="switchTab('orders',this)">📦 سفارش‌ها</div>
<div class="tab" onclick="switchTab('products',this)">💊 محصولات</div>
</div>
<div id="ordersTab" class="tab-content">
<div class="stats-row">
<div class="stat-card"><div class="stat-icon">📦</div><div class="stat-num" id="statTotal">-</div><div class="stat-label">کل سفارش‌ها</div></div>
<div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-num" id="statPending">-</div><div class="stat-label">در انتظار</div></div>
</div>
<div id="ordersList"><div class="loading-small"><div class="spinner"></div>در حال بارگذاری...</div></div>
</div>
<div id="productsTab" class="tab-content hidden">
<button class="add-product-btn" onclick="openProductModal(null)">+ افزودن محصول جدید</button>
<div id="productsList"><div class="loading-small"><div class="spinner"></div>در حال بارگذاری...</div></div>
</div>
</div>
<div class="modal-overlay hidden" id="productModal">
<div class="modal">
<div class="modal-title" id="modalTitle">افزودن محصول</div>
<input type="hidden" id="editId">
<div class="form-row"><label class="form-label">نام محصول *</label><input class="form-input" id="pName" placeholder="فشارسنج آکسان"></div>
<div class="form-row"><label class="form-label">دسته‌بندی</label><input class="form-input" id="pCategory" placeholder="فشارسنج"></div>
<div class="form-row"><label class="form-label">قیمت (تومان) *</label><input class="form-input" id="pPrice" type="number" placeholder="250000" dir="ltr"></div>
<div class="form-row"><label class="form-label">موجودی *</label><input class="form-input" id="pStock" type="number" placeholder="10" dir="ltr"></div>
<div class="form-row"><label class="form-label">توضیحات</label><input class="form-input" id="pDesc" placeholder="توضیح کوتاه"></div>
<div class="form-row"><label class="form-label">لینک تصویر</label><input class="form-input" id="pImage" placeholder="https://..." dir="ltr"></div>
<div class="toggle-row"><span class="form-label" style="margin:0">فعال در سایت</span><div class="toggle on" id="pActiveToggle" onclick="toggleActive()"><div class="toggle-thumb"></div></div></div>
<div class="modal-btns">
<button class="cancel-btn" onclick="closeModal()">انصراف</button>
<button class="save-btn" onclick="saveProduct()">ذخیره</button>
</div>
</div>
</div>
<script>
const SUPABASE_URL='https://kitpblirpmnbrdutysuo.supabase.co';
const SUPABASE_KEY='sb_publishable_Qk5vn9Abio71BY8_mVXOHA_U5K3F0WQ';
const ADMIN_PASS='saba1234';
let pActiveState=true;
async function supabase(method,table,body=null,query=''){const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{method,headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':method==='PATCH'?'return=representation':''},body:body?JSON.stringify(body):null});if(!res.ok)throw new Error(await res.text());const text=await res.text();return text?JSON.parse(text):null}

function logout(){document.getElementById('loginScreen').classList.remove('hidden')
